databaseChangeLog:
  - changeSet:
      id: 008-create-projection-checkpoints
      author: sanmoo
      changes:
        - createTable:
            tableName: projection_checkpoints
            columns:
              - column:
                  name: projection_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_projected_version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: last_event_id
                  type: UUID
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: projection_checkpoints
            columnNames: projection_name, aggregate_type, aggregate_id
            constraintName: pk_projection_checkpoints
