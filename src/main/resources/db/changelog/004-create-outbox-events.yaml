databaseChangeLog:
  - changeSet:
      id: 004-create-outbox-events
      author: sanmoo
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: event_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: metadata
                  type: JSONB
                  defaultValueComputed: "'{}'::jsonb"
                  constraints:
                    nullable: false
              - column:
                  name: occurred_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: processed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: processing_attempts
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: TEXT
        - addUniqueConstraint:
            tableName: outbox_events
            columnNames: aggregate_type, aggregate_id, aggregate_version
            constraintName: uq_outbox_events_aggregate_type_id_version
        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_pending
            columns:
              - column:
                  name: occurred_at
