databaseChangeLog:
  - changeSet:
      id: 002-create-idempotency-records
      author: sanmoo
      changes:
        - createTable:
            tableName: idempotency_records
            remarks: "Idempotency records for duplicate command detection"
            columns:
              - column:
                  name: idempotency_key
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: command_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: request_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: response_payload
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: completed_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
