databaseChangeLog:
  - changeSet:
      id: 007-create-outbox-deliveries
      author: sanmoo
      changes:
        - createTable:
            tableName: outbox_deliveries
            columns:
              - column:
                  name: event_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: consumer_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: processing_attempts
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: max_attempts
                  type: INT
                  defaultValueNumeric: 10
                  constraints:
                    nullable: false
              - column:
                  name: next_attempt_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: locked_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: locked_by
                  type: VARCHAR(255)
              - column:
                  name: last_error
                  type: TEXT
              - column:
                  name: blocked_reason
                  type: TEXT
              - column:
                  name: blocked_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: processed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: failed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: outbox_deliveries
            columnNames: event_id, consumer_name
            constraintName: pk_outbox_deliveries
        - addForeignKey:
            baseTableName: outbox_deliveries
            baseColumnNames: event_id
            referencedTableName: outbox_events
            referencedColumnNames: event_id
            constraintName: fk_outbox_deliveries_event
        - addForeignKey:
            baseTableName: outbox_deliveries
            baseColumnNames: consumer_name
            referencedTableName: outbox_consumers
            referencedColumnNames: consumer_name
            constraintName: fk_outbox_deliveries_consumer
        - createIndex:
            tableName: outbox_deliveries
            indexName: idx_outbox_deliveries_consumer_pending
            columns:
              - column:
                  name: consumer_name
              - column:
                  name: status
              - column:
                  name: next_attempt_at
        - addCheckConstraint:
            tableName: outbox_deliveries
            constraintName: ck_outbox_deliveries_status
            condition: status IN ('PENDING', 'PROCESSING', 'PROCESSED', 'BLOCKED', 'FAILED')
