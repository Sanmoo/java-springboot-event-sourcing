databaseChangeLog:
  - changeSet:
      id: 001-create-event-store
      author: sanmoo
      changes:
        - createTable:
            tableName: event_store
            remarks: "Event store table for persisting domain events"
            columns:
              - column:
                  name: event_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: metadata
                  type: JSONB
                  constraints:
                    nullable: true
              - column:
                  name: occurred_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: event_store
            columnNames: aggregate_type, aggregate_id, aggregate_version
            constraintName: uq_event_store_aggregate_type_id_version
        - createIndex:
            tableName: event_store
            indexName: idx_event_store_aggregate
            columns:
              - column:
                  name: aggregate_type
              - column:
                  name: aggregate_id
